name: Match Retrain Check

on:
  schedule:
    - cron: "15 5 * * *"
  workflow_dispatch:

jobs:
  retrain-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run match retrain check
        run: npm run cron:match-retrain-check
        env:
          NODE_ENV: production
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MATCH_RETRAIN_MIN_AUC: 0.78
          MATCH_RETRAIN_CONVERSION_DROP: 0.20
          MATCH_RETRAIN_MIN_LABELED_EVENTS: 300
          MATCH_RETRAIN_WINDOW_DAYS: 30
          MATCH_RETRAIN_TRIGGER_URL: ${{ secrets.MATCH_RETRAIN_TRIGGER_URL }}
          MATCH_RETRAIN_TRIGGER_TOKEN: ${{ secrets.MATCH_RETRAIN_TRIGGER_TOKEN }}
          MATCH_TARGET_INTERVIEW_RATE: 0.10
          MATCH_TARGET_POST_INTERVIEW_HIRE_RATE: 0.35
          MATCH_TARGET_OFFER_ACCEPTANCE_RATE: 0.78
          MATCH_TARGET_WINDOW_DAYS: 7
          MATCH_TARGET_MIN_SAMPLE_SIZE: 20
          MATCH_TARGET_RETRAIN_GAP: 0.15
