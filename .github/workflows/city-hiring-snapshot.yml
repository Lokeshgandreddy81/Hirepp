name: City Hiring Snapshot

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run city hiring snapshot
        run: npm run cron:city-hiring-snapshot
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
