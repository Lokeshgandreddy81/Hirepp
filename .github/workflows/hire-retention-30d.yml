name: Hire Retention 30D

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  retention:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run 30d retention event cron
        run: npm run cron:hire-retention-30d
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
