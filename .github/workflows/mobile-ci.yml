name: Mobile CI

on:
  push:
    branches: [ "main", "staging" ]
    paths:
      - 'mobile-app/**'
  pull_request:
    branches: [ "main", "staging" ]
    paths:
      - 'mobile-app/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./mobile-app

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './mobile-app/package-lock.json'

    - name: Install dependencies
      run: npm ci

    # - name: Run Linter
    #   run: npm run lint

    - name: Run Tests
      run: npm test -- --watchAll=false --passWithNoTests

    - name: Setup Expo
      uses: expo/expo-github-action@v8
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}

    - name: EAS Build Validations
      run: eas build --platform all --profile development --local # Dry run locally
      continue-on-error: true # Just a validation step in CI
