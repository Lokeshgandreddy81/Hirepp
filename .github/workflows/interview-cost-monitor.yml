name: Interview Cost Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run interview cost monitor
        run: npm run cron:interview-cost-monitor
        working-directory: ./backend
        env:
          NODE_ENV: production
          MONGO_URI: ${{ secrets.MONGO_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          INTERVIEW_DAILY_COST_THRESHOLD_USD: ${{ secrets.INTERVIEW_DAILY_COST_THRESHOLD_USD }}
          INTERVIEW_UPLOAD_DISABLE_FLAG_TTL_SECONDS: 7200
