name: Match Model Train

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Install matching engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r matching-engine/requirements.txt

      - name: Extract training dataset
        run: npm run match:extract-training
        working-directory: ./backend
        env:
          NODE_ENV: production
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MATCH_TRAIN_WINDOW_DAYS: 365
          MATCH_OBSERVATION_DAYS: 30

      - name: Train match model
        run: npm run match:train-model
        working-directory: ./backend
        env:
          NODE_ENV: production
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MATCH_MODEL_MIN_CLUSTER_SAMPLES: 120
          MATCH_MODEL_MIN_CITY_SAMPLES: 240
          MATCH_MODEL_MIN_POSITIVE_SAMPLES: 20
          MATCH_TRAIN_RANDOM_SEED: 42

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: match-model-training-artifacts
          path: |
            backend/training-data/match-training.json
            backend/training-data/match-training.csv
            backend/training-data/match-model-artifacts.json
            backend/training-data/model-training-report.json
